databases:
  - name: plugus-db
    databaseName: plugus
    user: plugus
    plan: free # Note: Free tier databases expire after 90 days
    ipAllowList: [] # Only allow internal connections

services:
  # Python Backend Service
  - type: web
    name: plugus-backend
    runtime: docker
    rootDir: .
    dockerfilePath: backend/Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: plugus-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: REDIS_URL
        fromService:
          type: redis
          name: plugus-redis
          property: connectionString
      - key: PORT
        value: 8000

  # Redis for Background Tasks
  - type: redis
    name: plugus-redis
    region: oregon
    plan: free
    ipAllowList: [] # Internal only

  # Frontend Static Site
  - type: web
    name: plugus-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npx expo export -p web
    staticPublishPath: dist
    envVars:
      - key: EXPO_PUBLIC_API_URL
        value: https://plugus-backend.onrender.com/api/v1
